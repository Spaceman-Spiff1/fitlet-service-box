name: CI

"on":
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t shell_scripts < <(find . -type f -name '*.sh' | sort)
          if (( ${#shell_scripts[@]} == 0 )); then
            echo "No shell scripts found"
            exit 1
          fi
          shellcheck "${shell_scripts[@]}"

  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install yamllint
        run: python -m pip install --disable-pip-version-check yamllint

      - name: Lint YAML files
        run: yamllint -c .yamllint.yml .

  pylint:
    name: Pylint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install pylint
        run: python -m pip install --disable-pip-version-check pylint

      - name: Lint Python files
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t python_files < <(find . -type f -name '*.py' | sort)
          if (( ${#python_files[@]} == 0 )); then
            echo "No Python files found; skipping pylint"
            exit 0
          fi
          pylint --rcfile=.pylintrc "${python_files[@]}"

  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Lint GitHub Actions workflows
        uses: rhysd/actionlint@v1

  smoke-checks:
    name: Repo Smoke Checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Run repo smoke checks
        run: ./scripts/ci-checks.sh
