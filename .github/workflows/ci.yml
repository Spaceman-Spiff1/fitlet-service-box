name: CI

"on":
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t shell_scripts < <(find . -type f -name '*.sh' | sort)
          if (( ${#shell_scripts[@]} == 0 )); then
            echo "No shell scripts found"
            exit 1
          fi
          shellcheck "${shell_scripts[@]}"

  docker-smoke-test:
    name: Docker Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Run docker/image smoke test
        run: ./scripts/docker-smoke-test.sh

  package-build:
    name: Package Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Build installer artifacts
        run: bash ./scripts/build-installer.sh --version ci

      - name: Validate packaged artifacts
        shell: bash
        run: |
          set -euo pipefail
          archive_contents="$(tar -tzf ./dist/fitlet-service-box-installer-ci.tar.gz)"
          test -x ./dist/fitlet-service-box-installer-ci.run
          test -f ./dist/fitlet-service-box-installer-ci.tar.gz
          test -f ./dist/fitlet-service-box-installer-ci.sha256
          (
            cd ./dist
            sha256sum -c fitlet-service-box-installer-ci.sha256
          )
          extract_root="$(mktemp -d)"
          repo_dir="$(./dist/fitlet-service-box-installer-ci.run --extract-only --target-dir "$extract_root")"
          test -f "$repo_dir/install.sh"
          test -f "$repo_dir/docker-compose.yml"
          test -f "$repo_dir/.env.example"
          printf '%s\n' "$archive_contents" | grep -Fxq 'fitlet-service-box/install.sh'

  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install yamllint
        run: python -m pip install --disable-pip-version-check yamllint

      - name: Lint YAML files
        run: yamllint -c .yamllint.yml .

  pylint:
    name: Pylint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install pylint
        run: python -m pip install --disable-pip-version-check pylint

      - name: Lint Python files
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t python_files < <(find . -type f -name '*.py' | sort)
          if (( ${#python_files[@]} == 0 )); then
            echo "No Python files found; skipping pylint"
            exit 0
          fi
          pylint --rcfile=.pylintrc "${python_files[@]}"

  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Lint GitHub Actions workflows
        uses: devops-actions/actionlint@v0.1.10

  smoke-checks:
    name: Repo Smoke Checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Run repo smoke checks
        run: ./scripts/ci-checks.sh
